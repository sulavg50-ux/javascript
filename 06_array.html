<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array and object</title>
</head>
<body>
    <div class="container">Simple si html</div>
    <script>
        let name=[1,2,3,4,"Sulav",true]
     console.log(name[5])

     //can be written in another ways
     let name1=new Array(1,2,3,4,5,"Sulav",true)
     console.log(name1)
     console.log(name1.length)
     console.log(name1.sort())
     console.log(name1.push("This is a new element"))

//object
let user={
    name:"sulav",
    age:18,
    city:"pokhara",
    gender:"male"

};
console.log(user)
console.log(user.age)
</script>
</body>
</html>
