<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scope and conditional statement</title>
</head>
<script>


    //global scope(if a variable is declared outside the function then it can be accessed anywhere in the code)
    let a=10;
    function fun1(){
        console.log(a);//can access

    }
    fun1();
    console.log(a);// can access


 // local scope(if a variable is declare inside the function then it is not accessible to call outside the function)
 function fun2(){
    let b=20;
    console.log(b)//can acess here
 }
 fun2();
 //console.log(b)// cannot access here



//if else statement
let age=50;
if(age>=18 && age<=60){
    console.log("You can access ")
}
else{
    console.log("Sorry")
}


//switch statement
let day=3;
switch(day){
    case 1:
    console.log("Sunday");
    break;
    case 2:
        console.log("Monday");
        break;              
    case 3:
        console.log("Tuesday");
        break;
        case 4:
            console.log("Wednesday");
            break;
            case 5:
                console.log("Thursday");
                break;
                case 6:
                    console.log("Friday");
                    break;
                    case 7:
                        console.log("Saturday");
                        break;
                        default:
                            console.log("Invalid day")

}


</script>
<body>
    <div>
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
            <li>Item 4</li>
            <li>Item 5</li>
        </ul>
    </div>
</body>
</html>
