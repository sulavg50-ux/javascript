<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript</title>
    <script>
        //Length
        let msg="sulav"
        console.log(msg.length);

    //touppercase and tolowercase

    let msg1="This is message for sulav"
    console.log(msg1.toUpperCase())
    console.log(msg1.toLowerCase())

    //index
    let msg2="Sulav Giri is a hancy"
    console.log(msg2.indexOf("i"))//gives first index of i 
    console.log(msg2.lastIndexOf("i"))//gives last index f i


    //slice
    console.log(msg2.slice(0,8));//print from 0 index to 8 
    console.log(msg2.slice(8));

    //substring (similar to slice)
    console.log(msg2.substring(0,4))

    //replace
    console.log(msg2.replace("Sulav","Rupesh"))

    //trim (remove space from any sentence)
    console.log(msg2.trim())

    //split (convert string to array)
    let fruits="apple,banana,orange"
    console.log(fruits.split(","))

    //includes (check if the wordis in a sentence or not)
    let msg5="This is a paragraph written by Sulav"
    console.log(msg5.includes("Sulav"))

    </script>
</head>
<body>
    <div class="containe">
        <h1>This is a heading</h1>
        <div class="container"><p>this is a paragraph and it is not a good one</p></div>
    </div>
</body>
</html>
